<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巴利语三藏学习指南 | Pāli Canon Study Guide</title>
<style>
:root {
  --bg: #faf8f5;
  --bg-warm: #f5f0e8;
  --accent: #8b6914;
  --accent-light: #c4a24e;
  --accent-bg: #f8f3e6;
  --card-bg: #fff;
  --text: #3a3228;
  --text-light: #7a7068;
  --border: #e8e0d4;
  --hover-bg: #fdf8ef;
  --shadow: 0 2px 8px rgba(100,80,40,0.08);
  --shadow-hover: 0 4px 16px rgba(100,80,40,0.14);
  --radius: 10px;
  --pali-color: #9a8a70;
  --toolbar-bg: #f0ebe3;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Noto Serif SC", Georgia, "Times New Roman", serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.site-header {
  text-align: center;
  padding: 40px 20px 30px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--bg-warm), var(--bg));
}
.site-header h1 { font-size: 1.8em; color: var(--accent); font-weight: 700; }
.site-header .subtitle { color: var(--text-light); margin-top: 6px; font-size: 0.95em; }

/* Container */
.container { max-width: 1100px; margin: 0 auto; padding: 20px; }

/* Category Cards */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin: 30px 0; }
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow);
  text-align: center;
}
.card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); border-color: var(--accent-light); }
.card .icon { font-size: 2.4em; display: block; margin-bottom: 12px; }
.card .card-title { font-size: 1.15em; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.card .card-title-en { font-size: 0.82em; color: var(--text-light); }

/* Back button */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 18px; margin-bottom: 20px;
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px;
  cursor: pointer; font-size: 0.9em; color: var(--text); font-family: inherit;
  transition: all 0.15s;
}
.back-btn:hover { background: var(--hover-bg); border-color: var(--accent-light); }

/* Category View */
.cat-header { margin-bottom: 24px; }
.cat-header h2 { font-size: 1.5em; color: var(--accent); }
.cat-header .cat-en { color: var(--text-light); font-size: 0.9em; }

.section-title {
  font-size: 1.1em; font-weight: 700; color: var(--accent);
  margin: 28px 0 10px; padding-bottom: 6px; border-bottom: 2px solid var(--border);
}

/* Sutta Table */
.sutta-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; background: var(--card-bg); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
.sutta-table th {
  background: var(--accent-bg); text-align: left; padding: 10px 14px;
  font-size: 0.85em; color: var(--accent); font-weight: 600; border-bottom: 1px solid var(--border);
}
.sutta-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 0.9em; vertical-align: top; }
.sutta-table tr:last-child td { border-bottom: none; }
.sutta-table tr.clickable { cursor: pointer; transition: background 0.15s; }
.sutta-table tr.clickable:hover { background: var(--hover-bg); }
.sutta-table tr.summary-row { background: var(--accent-bg); font-style: italic; color: var(--text-light); }
.sutta-table td:first-child { white-space: nowrap; font-weight: 500; }

/* Themes */
.themes-section { margin-top: 30px; }
.themes-section h3 { font-size: 1.1em; color: var(--accent); margin-bottom: 12px; }
.theme-tag {
  display: inline-block; background: var(--accent-bg); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px; margin: 4px; font-size: 0.82em; color: var(--text);
}

/* Reader View */
.reader-meta { margin-bottom: 20px; padding: 16px; background: var(--accent-bg); border-radius: var(--radius); }
.reader-meta h2 { font-size: 1.3em; color: var(--accent); margin-bottom: 4px; }
.reader-meta .meta-focus { font-weight: 600; margin-top: 6px; }
.reader-meta .meta-summary { color: var(--text-light); font-size: 0.9em; margin-top: 4px; }

/* Toolbar */
.toolbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--toolbar-bg); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.toolbar .tb-group { display: flex; gap: 4px; flex-wrap: wrap; }
.tb-btn {
  padding: 5px 12px; border: 1px solid var(--border); border-radius: 5px;
  background: var(--card-bg); cursor: pointer; font-size: 0.8em;
  font-family: inherit; color: var(--text); transition: all 0.15s;
}
.tb-btn:hover { border-color: var(--accent-light); background: var(--hover-bg); }
.tb-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tb-toggle { font-size: 0.8em; display: flex; align-items: center; gap: 4px; margin-left: 8px; cursor: pointer; }
.tb-toggle input { cursor: pointer; }
.tb-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

/* Segment display */
.segment-block { margin-bottom: 14px; }
.seg-pali { font-style: italic; color: var(--pali-color); font-size: 0.92em; line-height: 1.5; margin-bottom: 2px; }
.seg-en { line-height: 1.7; }
.seg-zh { line-height: 1.8; }

/* Side by side */
.side-by-side { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
.side-col h3 { font-size: 1em; color: var(--accent); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

/* Loading / Error */
.loading { text-align: center; padding: 60px 20px; color: var(--text-light); }
.spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { text-align: center; padding: 40px 20px; color: #a04040; background: #fef5f5; border-radius: var(--radius); margin: 20px 0; }

.sc-link { display: inline-block; margin-top: 24px; padding: 8px 20px; background: var(--accent); color: #fff; border-radius: 6px; font-size: 0.9em; }
.sc-link:hover { background: var(--accent-light); text-decoration: none; }

.reader-content { padding: 20px 0; }

/* Mobile */
@media (max-width: 700px) {
  .cards { grid-template-columns: 1fr; }
  .side-by-side { grid-template-columns: 1fr; }
  .toolbar { padding: 8px 10px; gap: 6px; }
  .tb-btn { padding: 4px 8px; font-size: 0.75em; }
  .sutta-table td:first-child { white-space: normal; }
  .site-header h1 { font-size: 1.4em; }
  .container { padding: 14px; }
}
</style>
</head>

const S2T_T="愛礙襖奧壩罷擺敗頒辦綁榜報貝備輩筆畢邊編變辯標鱉別賓撥補參蠶殘慚慘燦蒼艙層產長嘗償廠暢車徹塵陳襯稱懲誠騁遲齒衝蟲醜籌處觸礎傳創純辭詞賜聰從叢竄達帶擔單當擋黨檔導燈鄧敵滌遞點電墊澱調諜疊釘東動棟凍鬥獨讀賭鍍鍛斷對噸頓奪墮鵝額惡兒爾餌貳發罰閥煩範飛廢費紛墳奮憤豐鋒風鳳膚輻撫輔賦復負婦縛該蓋幹趕感岡綱崗鋼搞鎬稿個給龔宮鞏貢購夠顧僱觀館慣廣規龜歸軌貴櫃國過鉿韓號閤賀橫恆轟鴻紅後壺護華畫劃話懷壞歡環還緩換喚煥患荒皇輝回匯會繪葷渾夥獲貨禍擊積飢跡際劑濟繼記技計紀夾頰堅監減簡檢鑑鍵艦漸踐薦劍賤見間將獎槳醬講膠腳餃攪繳轎較階節傑潔結屆緊進晉盡禁經驚淨競糾舊舉據鋸懼劇鵑卷覺決絕軍駿開凱顆殼課肯墾懇鏗庫誇塊寬況虧巋窺饋擴闊蠟臘萊來賴蘭攔欄爛濫勞澇樂類離歷麗勵礫瀝隸倆聯簾憐蓮連煉練糧兩輛諒療遼瞭臨鄰靈嶺劉龍籠壟攏樓露盧蘆顱廬爐魯陸虜錄祿濾綠巒攣亂掠掄輪論蘿羅邏騾落媽馬買賣邁脈饅滿謾貓貿麼沒鎂門悶萌錳夢彌覓滅廟蔑閩鳴銘謬謀畝哪鈉難惱腦呢擬逆釀鳥聶鑷寧農濃怒諾偶盤龐賠噴鵬騙頻憑評潑撲樸鋪齊啟氣棄牽簽遷錢潛淺譴塹槍強搶鍬橋竅竊欽侵親輕氫傾慶窮瓊丘區驅趨權勸確讓擾熱認紉榮絨軟銳閏潤灑喪騷掃澀殺紗篩曬刪閃贍繕傷賞燒紹賒攝懾設紳審腎滲聲勝師獅濕實識駛釋壽書輸屬術樹豎數帥雙誰順說絲飼鬆聳頌訟誦搜蘇訴肅雖隨歲孫損縮鎖她台態攤貪壇談嘆湯趟燙濤討謄銻題體屜天條鐵廳聽銅統頭圖團推腿退吞拖馱駝橢窪襪彎灣萬網圍為韋維緯偽葦衛溫聞紋穩問甕撾蝸渦窩嗚鎢烏無蕪吳務誤錫犧襲習銑戲細蝦轄嚇鍁鮮纖鹹顯險餡憲線獻鄉詳響項橡嚮協脅褻寫洩卸鋅興洶繡虛敘緒續軒選懸學尋詢訓訊壓鴉鴨啞亞煙嚴巖顏閻艷驗陽養樣藥謠堯搖遙頁業葉醫銥儀蟻億憶義藝異議譯陰銀飲隱應瑩蠅穎擁湧優郵猶鈾遊魚漁嶼語籲鬱譽預馭鴛淵圓遠願約躍鑰嶽閱雲運醞雜災載暫贊贓髒鑿棗竈則擇澤責賊贈扎鍘軋閘詐摘齋債氈戰盞斬展輾佔棧綻張漲帳賬脹趙哲轍針偵診鎮陣掙睜鄭證織職執紙質滯鐘終種腫眾謅軸皺晝朱駐鑄築專莊樁裝壯狀錐墜贅準濁資蹤綜總縱鄒組鑽";

function toTraditional(text) {
  let r = '';
  for (const ch of text) {
    const i = S2T_S.indexOf(ch);
    r += i >= 0 ? S2T_T[i] : ch;
  }
  return r;
}
function toSimplified(text) {
  let r = '';
  for (const ch of text) {
    const i = S2T_T.indexOf(ch);
    r += i >= 0 ? S2T_S[i] : ch;
  }
  return r;
}

// State
let DATA = null;
let useTraditional = false;
let showPali = true;
let readerMode = 'pali-en';

const app = document.getElementById('app');

// Load data
async function init() {
  try {
    const res = await fetch('suttas.json');
    DATA = await res.json();
    route();
  } catch (e) {
    app.innerHTML = '<div class="error-msg">无法加载经文数据: ' + e.message + '</div>';
  }
}

// Router
function route() {
  const hash = location.hash || '#/';
  if (hash.startsWith('#/read/')) {
    const rest = hash.slice(7);
    const [uid, query] = rest.split('?');
    const params = new URLSearchParams(query || '');
    renderReader(uid, params.get('en_author') || 'sujato', params.get('zh_author') || 'zhuang');
  } else if (hash.startsWith('#/category/')) {
    const key = hash.slice(11);
    renderCategory(key);
  } else {
    renderHome();
  }
}
window.addEventListener('hashchange', route);

// Find sutta info in DATA
function findSutta(uid) {
  for (const cat of Object.values(DATA.categories)) {
    for (const sec of cat.sections) {
      for (const s of sec.suttas) {
        if (s.uid === uid) return s;
      }
    }
  }
  return null;
}

// === HOME VIEW ===
function renderHome() {
  const cats = DATA.categories;
  let html = '<div class="cards">';
  for (const [key, cat] of Object.entries(cats)) {
    html += `<div class="card" onclick="location.hash='#/category/${key}'">
      <span class="icon">${cat.icon}</span>
      <div class="card-title">${cat.title}</div>
      <div class="card-title-en">${cat.title_en}</div>
    </div>`;
  }
  html += '</div>';
  app.innerHTML = html;
}

// === CATEGORY VIEW ===
function renderCategory(key) {
  const cat = DATA.categories[key];
  if (!cat) { renderHome(); return; }

  let html = `<button class="back-btn" onclick="location.hash='#/'">← 返回首页</button>`;
  html += `<div class="cat-header"><h2>${cat.icon} ${cat.title}</h2><div class="cat-en">${cat.title_en}</div></div>`;

  for (const sec of cat.sections) {
    if (sec.section) {
      html += `<div class="section-title">${sec.section}</div>`;
    }
    html += `<table class="sutta-table"><thead><tr><th>经文名</th><th>重点</th><th>内容总结</th></tr></thead><tbody>`;
    for (const s of sec.suttas) {
      if (!s.uid) {
        html += `<tr class="summary-row"><td>${esc(s.name)}</td><td>${esc(s.focus)}</td><td>${esc(s.summary)}</td></tr>`;
      } else {
        html += `<tr class="clickable" onclick="location.hash='#/read/${s.uid}?en_author=${s.en_author}&zh_author=${s.zh_author}'">
          <td>${esc(s.name)}</td><td>${esc(s.focus)}</td><td>${esc(s.summary)}</td></tr>`;
      }
    }
    html += '</tbody></table>';
  }

  if (cat.themes && cat.themes.length) {
    html += '<div class="themes-section"><h3>主题索引</h3><div>';
    for (const t of cat.themes) {
      html += `<span class="theme-tag"><b>${esc(t.topic)}</b>: ${esc(t.suttas)}</span>`;
    }
    html += '</div></div>';
  }
  app.innerHTML = html;
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// === READER VIEW ===
async function renderReader(uid, enAuthor, zhAuthor) {
  const info = findSutta(uid);
  let html = `<button class="back-btn" onclick="history.back()">← 返回</button>`;
  if (info) {
    html += `<div class="reader-meta"><h2>${esc(info.name)}</h2>`;
    if (info.focus) html += `<div class="meta-focus">重点: ${esc(info.focus)}</div>`;
    if (info.summary) html += `<div class="meta-summary">${esc(info.summary)}</div>`;
    html += '</div>';
  }
  html += '<div class="loading"><div class="spinner"></div><div>正在从 SuttaCentral 加载经文...</div></div>';
  app.innerHTML = html;

  try {
    const [enData, zhData] = await Promise.all([
      fetchEn(uid, enAuthor),
      fetchZh(uid, zhAuthor)
    ]);
    renderReaderContent(uid, enData, zhData, info);
  } catch (e) {
    app.querySelector('.loading').outerHTML = `<div class="error-msg">加载失败: ${e.message}<br>请检查网络连接或稍后重试</div>
      <a class="sc-link" href="https://suttacentral.net/${uid}" target="_blank">在 SuttaCentral 查看 →</a>`;
  }
}

async function fetchEn(uid, author) {
  const r = await fetch(`https://suttacentral.net/api/bilarasuttas/${uid}/${author}`);
  if (!r.ok) throw new Error('英文版加载失败 (' + r.status + ')');
  return await r.json();
}

async function fetchZh(uid, author) {
  const r = await fetch(`https://suttacentral.net/api/suttas/${uid}/${author}?lang=zh`);
  if (!r.ok) throw new Error('中文版加载失败 (' + r.status + ')');
  return await r.json();
}

function stripHtml(html) {
  if (!html) return '';
  return html.replace(/<[^>]+>/g, '').replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#39;/g, "'").trim();
}

function convertChinese(text) {
  return useTraditional ? toTraditional(text) : text;
}

function renderReaderContent(uid, enData, zhData, info) {
  // Extract segments
  const root = enData.root_text || {};
  const trans = enData.translation_text || {};
  const order = enData.keys_order || Object.keys(trans);

  // Extract Chinese text
  let zhText = '';
  if (zhData && zhData.translation && zhData.translation.text) {
    zhText = stripHtml(zhData.translation.text);
  }

  // Build toolbar + content container
  let html = `<button class="back-btn" onclick="history.back()">← 返回</button>`;
  if (info) {
    html += `<div class="reader-meta"><h2>${esc(info.name)}</h2>`;
    if (info.focus) html += `<div class="meta-focus">重点: ${esc(info.focus)}</div>`;
    if (info.summary) html += `<div class="meta-summary">${esc(info.summary)}</div>`;
    html += '</div>';
  }

  html += `<div class="toolbar" id="reader-toolbar">
    <div class="tb-group">
      <button class="tb-btn${readerMode==='pali-en'?' active':''}" data-mode="pali-en">巴利-英文</button>
      <button class="tb-btn${readerMode==='pali-zh'?' active':''}" data-mode="pali-zh">巴利-中文</button>
      <button class="tb-btn${readerMode==='en-zh'?' active':''}" data-mode="en-zh">英中对照</button>
      <button class="tb-btn${readerMode==='en'?' active':''}" data-mode="en">单独英文</button>
      <button class="tb-btn${readerMode==='zh'?' active':''}" data-mode="zh">单独中文</button>
    </div>
    <div class="tb-sep"></div>
    <label class="tb-toggle"><input type="checkbox" id="pali-toggle" ${showPali?'checked':''}> 显示巴利语</label>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="s2t-btn">${useTraditional?'切换简体':'切换繁体'}</button>
  </div>`;

  html += '<div class="reader-content" id="reader-body"></div>';
  html += `<div style="text-align:center;padding:20px 0"><a class="sc-link" href="https://suttacentral.net/${uid}" target="_blank">在 SuttaCentral 查看原文 →</a></div>`;

  app.innerHTML = html;

  // Store data for re-render
  window._readerData = { order, root, trans, zhText, uid };

  // Toolbar events
  document.getElementById('reader-toolbar').addEventListener('click', e => {
    const btn = e.target.closest('[data-mode]');
    if (btn) {
      readerMode = btn.dataset.mode;
      document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === readerMode));
      buildReaderBody();
    }
  });
  document.getElementById('pali-toggle').addEventListener('change', e => {
    showPali = e.target.checked;
    buildReaderBody();
  });
  document.getElementById('s2t-btn').addEventListener('click', () => {
    useTraditional = !useTraditional;
    document.getElementById('s2t-btn').textContent = useTraditional ? '切换简体' : '切换繁体';
    buildReaderBody();
  });

  buildReaderBody();
}

function buildReaderBody() {
  const { order, root, trans, zhText } = window._readerData;
  const body = document.getElementById('reader-body');
  const zhConverted = convertChinese(zhText);

  let html = '';

  if (readerMode === 'pali-en') {
    for (const key of order) {
      const p = root[key] || '';
      const e = trans[key] || '';
      if (!p && !e) continue;
      html += '<div class="segment-block">';
      if (showPali && p) html += `<div class="seg-pali">${esc(p)}</div>`;
      if (e) html += `<div class="seg-en">${esc(e)}</div>`;
      html += '</div>';
    }
  } else if (readerMode === 'pali-zh') {
    html += '<div class="side-by-side"><div class="side-col"><h3>Pāli</h3>';
    if (showPali) {
      for (const key of order) {
        const p = root[key] || '';
        if (p) html += `<div class="seg-pali" style="margin-bottom:8px">${esc(p)}</div>`;
      }
    } else {
      html += '<div style="color:var(--text-light);font-style:italic">巴利语已隐藏</div>';
    }
    html += '</div><div class="side-col"><h3>中文</h3>';
    html += `<div class="seg-zh">${esc(zhConverted)}</div>`;
    html += '</div></div>';
  } else if (readerMode === 'en-zh') {
    html += '<div class="side-by-side"><div class="side-col"><h3>English</h3>';
    for (const key of order) {
      const e = trans[key] || '';
      if (e) html += `<div class="seg-en" style="margin-bottom:8px">${esc(e)}</div>`;
    }
    html += '</div><div class="side-col"><h3>中文</h3>';
    html += `<div class="seg-zh">${esc(zhConverted)}</div>`;
    html += '</div></div>';
  } else if (readerMode === 'en') {
    for (const key of order) {
      const p = root[key] || '';
      const e = trans[key] || '';
      if (!e) continue;
      html += '<div class="segment-block">';
      if (showPali && p) html += `<div class="seg-pali">${esc(p)}</div>`;
      html += `<div class="seg-en">${esc(e)}</div>`;
      html += '</div>';
    }
  } else if (readerMode === 'zh') {
    if (showPali) {
      html += '<div class="side-by-side"><div class="side-col"><h3>Pāli</h3>';
      for (const key of order) {
        const p = root[key] || '';
        if (p) html += `<div class="seg-pali" style="margin-bottom:8px">${esc(p)}</div>`;
      }
      html += '</div><div class="side-col"><h3>中文</h3>';
      html += `<div class="seg-zh">${esc(zhConverted)}</div>`;
      html += '</div></div>';
    } else {
      html += `<div class="seg-zh">${esc(zhConverted)}</div>`;
    }
  }

  body.innerHTML = html;
}

// Start
init();
</script>
</body>
</html>
